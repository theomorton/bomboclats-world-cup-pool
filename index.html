<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bomboclats World Cup Pool</title>
    <link rel="stylesheet" href="styles.css?v=two-tab-blue">
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <div class="brand-identity">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 92 110" focusable="false">
            <path class="crest-shield" d="M6 4h80v61c0 18.5-12.5 32.4-40 41C18.5 97.4 6 83.5 6 65V4Z" />
            <path class="crest-divider" d="M7 35.5h78" />
            <g class="crest-book">
              <path class="book-shadow" d="M29 11c5.4-2.2 11.6-1.7 17 1.1 5.4-2.8 11.6-3.3 17-1.1v22c-5.7-2.1-11.2-1.8-17 .9-5.8-2.7-11.3-3-17-.9V11Z" />
              <path class="book-page" d="M31 9.5c4.6-1.6 9.6-1.1 14 1.4v21.5c-4.7-2.2-9.3-2.7-14-1.1V9.5Z" />
              <path class="book-page" d="M47 10.9c4.4-2.5 9.4-3 14-1.4v21.8c-4.7-1.6-9.3-1.1-14 1.1V10.9Z" />
              <path class="book-spine" d="M46 11.6v22.7" />
              <path class="book-gold" d="M30 33.4c5.9-1.7 10.7-1.1 16 1.5 5.3-2.6 10.1-3.2 16-1.5" />
              <path class="book-curl" d="M26 12.5c-2.8 2.6-2.8 6 0 8.2m40-8.2c2.8 2.6 2.8 6 0 8.2M25 24c-2.2 2.2-2.2 4.9 0 6.7m42-6.7c2.2 2.2 2.2 4.9 0 6.7" />
              <path class="book-glyph" d="M35 16.5c2 0 3.2 1 3.2 2.8v4.2m4.2-6.8v6.8m-8.2-1.7h7.2M51 16.5c2 0 3.2 1 3.2 2.8v4.2m4.2-6.8v6.8m-8.2-1.7h7.2" />
            </g>
            <circle class="crest-dot crest-dot-blue" cx="35" cy="47" r="5.8" />
            <circle class="crest-dot crest-dot-blue" cx="57" cy="47" r="5.8" />
            <circle class="crest-dot crest-dot-blue" cx="25" cy="59" r="5.8" />
            <circle class="crest-dot crest-dot-blue" cx="67" cy="59" r="5.8" />
            <path class="crest-diamond-top" d="M46 50 65 70H27L46 50Z" />
            <path class="crest-diamond-bottom" d="M27 70h38L46 90 27 70Z" />
            <circle class="crest-dot crest-dot-white" cx="25" cy="80" r="5.8" />
            <circle class="crest-dot crest-dot-white" cx="36" cy="91" r="5.8" />
            <circle class="crest-dot crest-dot-white" cx="56" cy="91" r="5.8" />
            <circle class="crest-dot crest-dot-white" cx="67" cy="80" r="5.8" />
            </svg>
          </span>
          <div class="brand-copy">
            <p class="eyebrow">Yale SOM / WC2026</p>
            <h1>Bomboclats World Cup Pool</h1>
            <p class="brand-subtitle">Private World Cup pool</p>
          </div>
        </div>
        <div id="header-status" class="header-emblems" aria-label="World Cup 2026 host marks">
          <span class="wc26-mark">26</span>
          <span class="host-pill">CAN</span>
          <span class="host-pill">USA</span>
          <span class="host-pill">MEX</span>
        </div>
      </div>
      <nav class="tabs" aria-label="Pool sections">
        <button class="tab is-active" type="button" data-tab="leaderboard" aria-selected="true">Pool</button>
        <button class="tab" type="button" data-tab="picks" aria-selected="false">Picks</button>
      </nav>
    </header>

    <main class="page-shell">
      <section id="leaderboard" class="panel is-active" aria-labelledby="leaderboard-title">
        <h2 id="leaderboard-title" class="sr-only">Standings</h2>
        <div id="leaderboard-table" class="standings-shell"></div>
        <div id="daily-scoreboard" class="daily-scoreboard"></div>
        <div id="leaderboard-summary" class="summary-grid"></div>
        <div id="command-center" class="command-center" hidden></div>
        <div id="insight-grid" class="insight-grid"></div>
      </section>

      <section id="picks" class="panel" aria-labelledby="picks-title">
        <div class="section-header picks-header">
          <div>
            <p class="eyebrow">Directory</p>
            <h2 id="picks-title">Picks</h2>
          </div>
        </div>

        <section class="directory-section" aria-labelledby="players-title">
          <div class="section-header">
            <div>
              <p class="eyebrow">Profiles</p>
              <h2 id="players-title">Players</h2>
            </div>
            <div class="section-tools player-controls" aria-label="Player controls">
              <label class="control-select">
                <span>Sort</span>
                <select id="player-sort" aria-label="Sort players">
                  <option value="points">Points</option>
                  <option value="alpha">A-Z</option>
                  <option value="alive">Alive</option>
                  <option value="budget">Budget</option>
                </select>
              </label>
              <label class="control-select">
                <span>Filter</span>
                <select id="player-filter" aria-label="Filter players">
                  <option value="all">All</option>
                  <option value="podium">Podium</option>
                  <option value="chasing">Chasing</option>
                  <option value="trouble">In Trouble</option>
                  <option value="pending">Pending</option>
                </select>
              </label>
            </div>
          </div>
          <div id="players-grid" class="players-grid"></div>
        </section>

        <section class="directory-section" aria-labelledby="teams-title">
          <div class="section-header teams-header">
            <div>
              <p class="eyebrow">Board</p>
              <h2 id="teams-title">Teams</h2>
            </div>
            <div class="team-controls" aria-label="Team filters">
              <label class="control-select">
                <span>View</span>
                <select id="team-view" aria-label="Team board view">
                  <option value="group">Group</option>
                  <option value="ownership">Ownership</option>
                  <option value="value">Value</option>
                </select>
              </label>
              <label class="control-select">
                <span>Filter</span>
                <select id="team-filter" aria-label="Team pick filter">
                  <option value="all">All teams</option>
                  <option value="picked">Picked only</option>
                </select>
              </label>
              <label class="search-wrap">
                <span class="sr-only">Search by team or player</span>
                <input id="team-search" type="search" placeholder="Search team or player">
              </label>
            </div>
          </div>
          <div id="teams-grid" class="team-groups"></div>
        </section>

        <section class="directory-section" aria-labelledby="rules-title">
          <div class="section-header">
            <div>
              <p class="eyebrow">Format</p>
              <h2 id="rules-title">Rules</h2>
            </div>
          </div>
          <div id="rules-content" class="rules-layout"></div>
        </section>
      </section>
    </main>

    <div id="detail-drawer" class="detail-drawer" aria-hidden="true"></div>

    <script src="data/teams.js"></script>
    <script src="data/players.js?v=italy-11"></script>
    <script src="data/results.js"></script>
    <script src="data/schedule.js"></script>
    <script src="app.js?v=two-tab-blue"></script>
  </body>
</html>
