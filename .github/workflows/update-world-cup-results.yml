name: Update and Deploy World Cup Pool

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-world-cup-results.yml"
      - "assets/**"
      - "data/**"
      - "scripts/**"
      - "app.js"
      - "index.html"
      - "styles.css"
      - "README.md"
      - ".nojekyll"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest results
        run: node scripts/update-results.mjs

      - name: Commit updated results
        run: |
          if git diff --quiet -- data/results.js data/schedule.js; then
            echo "No result or schedule changes to commit."
            exit 0
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/results.js data/schedule.js
            git commit -m "Update World Cup results"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
